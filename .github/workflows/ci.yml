name: CI Domino Placar

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Tests
        run: go test ./... -v

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  android-java:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Build with Gradle
        run: ./gradlew build

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Run Android Lint
        run: ./gradlew lintDebug

  frontend-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ESLint
        run: npm install eslint eslint-plugin-html --save-dev

      - name: Run ESLint on HTML/JS
        run: npx eslint "templates/**/*.html" "static/**/*.js"
