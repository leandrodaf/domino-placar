name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  trivy:
    name: Trivy Vulnerability Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.32.0
        with:
          scan-type: fs
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      matrix:
        language: [go, java, javascript-typescript]
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Create dummy google-services.json (Java only)
        if: matrix.language == 'java'
        run: |
          cat > android/app/src/google-services.json << 'EOF'
          {
            "project_info": { "project_number": "000000000000", "project_id": "dummy-ci", "storage_bucket": "dummy-ci.appspot.com" },
            "client": [
              { "client_info": { "mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": { "package_name": "net.dominoplacar.app" } }, "api_key": [{ "current_key": "dummy" }] },
              { "client_info": { "mobilesdk_app_id": "1:000000000000:android:0000000000000001", "android_client_info": { "package_name": "net.dominoplacar.app.debug" } }, "api_key": [{ "current_key": "dummy" }] }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
