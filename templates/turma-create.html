{{template "base" .}}

{{define "title"}}{{T .Lang "turma.title"}}{{end}}

{{define "content"}}
<div style="text-align:center; padding:24px 0 20px;">
  <div style="display:inline-flex; align-items:center; justify-content:center;
       width:56px; height:56px; background:var(--accent); border-radius:14px;
       font-size:1.8rem; box-shadow:0 0 20px var(--accent-glow); margin-bottom:16px;">
    👥
  </div>
  <h1 style="margin-bottom:6px;">{{T .Lang "turma.create_heading"}}</h1>
</div>

<div class="card">
  <form method="POST" action="/turma">
    <div class="form-group">
      <label for="name">{{T .Lang "turma.name_label"}}</label>
      <input type="text" id="name" name="name"
             placeholder="{{T .Lang "turma.name_placeholder"}}"
             required autocomplete="off" autofocus maxlength="50"
             style="font-size:1.05rem;">
    </div>
    <div class="form-group">
      <label for="description">{{T .Lang "turma.desc_label"}}</label>
      <input type="text" id="description" name="description"
             placeholder="{{T .Lang "turma.desc_placeholder"}}"
             autocomplete="off" maxlength="200">
    </div>
    <div class="form-group" style="margin-top:12px; margin-bottom:16px;">
      <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
        <input type="checkbox" name="is_private" style="width:auto;">
        {{T .Lang "turma.private_label"}}
      </label>
    </div>
    <hr style="border-color:var(--border); margin:16px 0;">
    <div class="form-group">
      <label for="player_name">{{T .Lang "turma.your_name"}}</label>
      <input type="text" id="player_name" name="player_name"
             placeholder="{{T .Lang "lobby.name_placeholder"}}"
             required autocomplete="off" maxlength="50">
    </div>
    <div class="form-group" style="margin-bottom:20px;">
      <label for="unique_id">{{T .Lang "turma.your_uid"}}</label>
      <input type="text" id="unique_id" name="unique_id"
             placeholder="{{T .Lang "turma.uid_placeholder"}}"
             required autocomplete="off" maxlength="50">
      <p style="font-size:0.78rem; color:var(--muted); margin-top:6px;">
        {{T .Lang "tournament.uid_help"}}
      </p>
    </div>
    <button type="submit" class="btn btn-primary" style="font-size:1.05rem; min-height:52px;">
      {{T .Lang "turma.create_submit"}}
    </button>
  </form>
</div>

<div style="text-align:center; margin-top:12px;">
  <a href="/" class="btn btn-ghost" style="font-size:0.88rem;">← {{T .Lang "global.back_home"}}</a>
</div>

<script>
(function() {
  var nameEl = document.getElementById('player_name');
  var uidEl  = document.getElementById('unique_id');
  var f = nameEl ? nameEl.closest('form') : null;
  dominoUser.fillForm(nameEl, uidEl);
  dominoUser.bindSave(f, nameEl, uidEl);
})();
</script>
{{end}}
