version: 2

project_name: domino-placar

builds:
  - main: .
    binary: domino-placar
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats_overrides:
      - goos: windows
        formats: [zip]
    files:
      - src: README.md
      - src: LICENSE
      - src: CHANGELOG.md
      - src: "templates/*"
      - src: "static/*"
      - src: "static/tiles/*"
      - src: "internal/i18n/locales/*"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  groups:
    - title: "New Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"

release:
  github:
    owner: leandrodaf
    name: domino-placar
  prerelease: auto
  name_template: "v{{ .Version }}"
  header: |
    ## Dominó Placar v{{ .Version }}

    Real-time digital scoreboard for Pontinho — the Brazilian domino game.

    ### Highlights
    - 🎯 Real-time scoring via SSE
    - 📸 Automatic tile detection via photo (Roboflow)
    - 🏆 Multi-table tournaments
    - 👥 Turmas (private groups) with invite codes
    - 📱 Android app with push notifications
    - 🌐 i18n: Portuguese & English

    **Play now → [dominoplacar.net](https://dominoplacar.net)**
  footer: |
    ---
    Full changelog: https://github.com/leandrodaf/domino-placar/compare/...{{ .Tag }}
